# Multi-AgentOS — Configuration
# ──────────────────────────────
# This file is the single source of truth for paths, nodes, agents, models.
# Copy to `config.yaml` and customise for your setup. The setup wizard does
# this for you on first run (`npm run setup`).
#
# Anything you set here overrides the built-in defaults. Anything you omit
# falls back to the defaults shipped with the app.
#
# ⚠️  DO NOT COMMIT `config.yaml` — it has your personal paths and keys.
#     Only commit `config.example.yaml` as the template.

# ── App identity ──────────────────────────────────────────────────────────
app:
  name: "Multi-AgentOS"           # Display name in TopBar
  port: 3000                    # Next.js dev server port
  accent: cyan                  # cyan | violet | pink | green | amber

# ── Vault (Obsidian) ──────────────────────────────────────────────────────
# Where the app auto-saves chats, journal, goals, missions.
# Can be local (same machine) or remote (over SSH).
vault:
  enabled: true
  # Local path: an absolute path on this machine
  localPath: "~/Documents/Obsidian"
  projectDir: "Multi-AgentOS"     # Subfolder inside the vault
  # Remote (SSH) — leave empty if vault is local
  ssh:
    enabled: false
    host: ""                   # e.g. 100.87.207.10
    user: "root"
    keyPath: "~/.ssh/id_ed25519"
    password: ""               # only if not using a key
  autoSave: true               # Auto-save chats/journal/missions/goals

# ── Nodes (the machines you orchestrate) ──────────────────────────────────
# Used by Node Monitor, Terminal, Mission Control panels.
nodes:
  - id: hetzner-vps
    name: "Hetzner VPS"
    role: "Openclaw Host"
    host: "100.87.207.10"       # Tailscale IP or public IP
    icon: "🖥️"
    color: "cyan"
  - id: mac-mini
    name: "Mac Mini"
    role: "Browser Node"
    host: "100.91.33.1"
    icon: "💻"
    color: "violet"
  - id: macbook
    name: "MacBook Pro"
    role: "Control Node"
    host: "localhost"
    icon: "🎯"
    color: "pink"

# ── AI providers ──────────────────────────────────────────────────────────
# API keys live in `.env.local` (never in this file).
# The setup wizard writes `.env.local` for you. To re-key, run `npm run setup`.
providers:
  # Default model for new chats
  defaultModel: "nvidia/deepseek-v4-flash"
  # Fallback if default fails
  fallbackModel: "MiniMax-M2.7-highspeed"
  # Provider priority for routing / fallbacks
  priority:
    - minimax
    - nvidia
    - kimi
    - openrouter
    - anthropic
    - openai
    - gemini
    - deepseek
    - hermes
    - openclaw
  # Custom endpoints (for hermes, openclaw, etc.)
  endpoints:
    hermes: "http://localhost:8765/v1"
    openclaw: "http://localhost:18789/v1"

# ── Agents ────────────────────────────────────────────────────────────────
# To add/remove agents, edit this list. Each agent maps to a persona prompt
# in `prompts/<agent-id>.md` (loaded at boot).
# To add a new agent:
#   1. Add an entry below
#   2. Create `prompts/<id>.md` with the system prompt
#   3. Pick an icon (from lucide-react) and an accent colour
agents:
  - id: agent-holly
    name: Holly
    icon: Sparkles
    accent: "rgba(6,182,212,"
    provider: Anthropic
    defaultModel: claude-haiku-4-5
    tagline: "Calm, efficient, ship-shape. The default operations brain."
    promptFile: "prompts/agent-holly.md"
  - id: agent-kryten
    name: Kryten
    icon: Bot
    accent: "rgba(249,115,22,"
    provider: Anthropic
    defaultModel: claude-sonnet-4-5
    tagline: "Mechanoid pedant. Technical precision, formal speech, exhaustive checks."
    promptFile: "prompts/agent-kryten.md"
  - id: agent-sally
    name: Sally
    icon: ClipboardList
    accent: "rgba(139,92,246,"
    provider: Anthropic
    defaultModel: claude-haiku-4-5
    tagline: "List-maker. Reads, organises, extracts. Never forgets a row."
    promptFile: "prompts/agent-sally.md"
  - id: agent-grim
    name: Grim
    icon: Anchor
    accent: "rgba(239,68,68,"
    provider: Anthropic
    defaultModel: claude-haiku-4-5
    tagline: "Task terminator. Closes loops, kills stuck jobs, deletes debt."
    promptFile: "prompts/agent-grim.md"
  - id: agent-oscar
    name: Oscar
    icon: Star
    accent: "rgba(251,191,36,"
    provider: Anthropic
    defaultModel: claude-opus-4-5
    tagline: "The oracle. Strategy, planning, second-opinion, big-picture."
    promptFile: "prompts/agent-oscar.md"
  - id: agent-reggie
    name: Reggie
    icon: Shield
    accent: "rgba(16,185,129,"
    provider: Anthropic
    defaultModel: claude-sonnet-4-5
    tagline: "The regulator. Safety, compliance, credentials, never-blind execution."
    promptFile: "prompts/agent-reggie.md"
  - id: agent-claude
    name: Claude
    icon: Brain
    accent: "rgba(168,85,247,"
    provider: Anthropic
    defaultModel: claude-sonnet-4-5
    tagline: "Anthropic Claude. Direct, no OpenClaw routing."
    promptFile: "prompts/agent-claude.md"
  - id: agent-hermes
    name: Hermes
    icon: Zap
    accent: "rgba(251,191,36,"
    provider: Custom
    defaultModel: claude-haiku-4-5
    tagline: "Fast, lightweight. Quick lookups, no ceremony."
    promptFile: "prompts/agent-hermes.md"
  - id: agent-direct
    name: Direct
    icon: MessageSquare
    accent: "rgba(255,255,255,"
    provider: Direct
    defaultModel: claude-sonnet-4-5
    tagline: "No persona. Just the model. Use for ad-hoc queries."
    promptFile: "prompts/agent-direct.md"

# ── Panels ────────────────────────────────────────────────────────────────
# Toggle which panels show in the sidebar.
panels:
  overview: true
  goals: true
  journal: true
  nodeMonitor: true
  missionControl: true
  terminal: true
  openclaw: true

# ── Bug reporting ────────────────────────────────────────────────────────
# Captures frontend errors and ships them to the vault.
bugReports:
  enabled: true
  vaultPath: "03-Projects/Agentic-OS/bugs"
